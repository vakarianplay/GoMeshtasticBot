mesh:
    port: node_port or node_ip
    node_info_text: Your text for /nodeinfo command
    openweathermap_api_key: api_key
    openweathermap_city: Moscow,RU
    narodmon_api_key: api_key
    narodmon_uuid: random uuid
    narodmon_sensor_id: sensor_id


matrix-relay:
    enabled: true
    homeserver: https://matrix.org
    username: user
    password: pass
    device_id: MESHBOT
    matrixRoomID: "!room_id:matrix.org"

telegram-relay:
    enabled: true
    botToken: tg_bot_token
    chatID: tg_chat_id

# example custom http put server https://gist.github.com/vakarianplay/600712d395e97783e350f3a890313583
custom-relay:
    enabled: true
    url: http://your_http_put_server
    authToken: Generate 'openssl rand -hex 32'

